flows:
  pattern_session_start:
    name: pattern_session_start
    description: Flow for starting the conversation
    run_pattern_completed: true

    nlu_trigger:
      - intent:
          name: session_start
          confidence_threshold: 0.7

    steps:
      - id: pattern_session_start_0_utter_session_start
        action: utter_session_start

  flow_get_store_hours:
    name: Get all store hours
    description: |
      Use this when the user asks for store hours in general and does not specify
      a particular day.

      This flow is intended to be started by the ask_store_hours NLU intent.

    # Note on LLM flow guard:
    # I tested adding `if: False` here to prevent the LLM CommandGenerator from
    # starting this flow. However, in this project, that guard also prevented the
    # NLUCommandAdapter from starting the flow from normal user text, even when
    # the ask_store_hours intent was classified above the 0.9 threshold.
    #
    # Because the guarded version fell through to search instead of running
    # action_get_all_store_hours, the guard was removed and this flow is triggered
    # through the NLU intent below.
    #
    # Alternative guard implementation:
    # The guard could still be used with a two-flow pattern. In that approach,
    # an unguarded NLU-only entry flow would be triggered by the ask_store_hours
    # intent, and that entry flow would link to a second internal flow containing
    # the actual store-hours action. The internal flow could use `if: False` so
    # the LLM CommandGenerator cannot start it directly, while still allowing it
    # to be reached through the link step from the NLU-triggered entry flow.
    nlu_trigger:
      - intent:
          name: ask_store_hours
          confidence_threshold: 0.9

    steps:
      - id: flow_get_store_hours_0_action_get_all_store_hours
        action: action_get_all_store_hours

  flow_get_store_hours_for_day:
    name: Get store hours for a specific day
    description: |
      Use this when the user asks for store hours on a specific weekday such as
      monday, tuesday, wednesday, thursday, friday, saturday, or sunday.

    nlu_trigger:
      - intent:
          name: ask_store_hours_for_day
          confidence_threshold: 0.7

    steps:
      - id: flow_get_store_hours_for_day_0_collect_slot_store_hours_day
        description: |
          The weekday the user is asking about. Only fill this slot when the user
          provides one of these valid weekday names: monday, tuesday, wednesday,
          thursday, friday, saturday, or sunday. Normalize the value to lowercase.
        collect: slot_store_hours_day
        utter: utter_ask_slot_store_hours_day
        ask_before_filling: false
        rejections:
          - if: >-
              slots.slot_store_hours_day is not "monday" and
              slots.slot_store_hours_day is not "tuesday" and
              slots.slot_store_hours_day is not "wednesday" and
              slots.slot_store_hours_day is not "thursday" and
              slots.slot_store_hours_day is not "friday" and
              slots.slot_store_hours_day is not "saturday" and
              slots.slot_store_hours_day is not "sunday"
            utter: utter_invalid_store_hours_day

      - id: flow_get_store_hours_for_day_1_action_get_store_hours_for_day
        action: action_get_store_hours_for_day

  flow_check_order_status:
    name: Check order status
    description: |
      Help the user check tracking, delivery status, shipping status, or order
      progress for an existing order.
      Use this flow only when the user wants status, tracking, delivery progress,
      or delay information.
      Do not use this flow when the user says cancel my order, cancel an order,
      cancel ord123, or stop an order from shipping.
    run_pattern_completed: true

    nlu_trigger:
      - intent:
          name: check_order_status
          confidence_threshold: 0.7

    steps:
      - id: flow_check_order_status_0_collect_slot_order_number
        description: |
          The order number the user provides. Capture the user answer exactly,
          even if it looks invalid or malformed.

          Valid examples include ord123, ord456, ord555, abc909, and abc123.
          Invalid examples such as 12345, bad-order-number, or any other text
          the user claims is their order number should still be captured so the
          rejection rule can validate it.
        collect: slot_order_number
        utter: utter_ask_slot_order_number
        ask_before_filling: false
        reset_after_flow_ends: true
        rejections:
          - if: not slots.slot_order_number matches "^[a-zA-Z]{3}[0-9]{3}$"
            utter: utter_valid_order_number_syntax
        force_slot_filling: false
        next:
          - if: slots.slot_order_number is "ord123"
            then:
              - id: flow_check_order_status_1_utter_order_in_transit
                action: utter_order_in_transit
                next: END

          - if: slots.slot_order_number is "ord456"
            then:
              - id: flow_check_order_status_2_utter_order_delivered
                action: utter_order_delivered
                next: END

          - if: slots.slot_order_number is "ord555"
            then:
              - id: flow_check_order_status_3_utter_order_delayed
                action: utter_order_delayed
                next: END

          - else: message_utter_order_number_not_found

      - id: message_utter_order_number_not_found
        action: utter_order_number_not_found
        next: flow_check_order_status_5_collect_slot_speak_to_human

      - id: flow_check_order_status_5_collect_slot_speak_to_human
        description: Whether the user wants to speak to a human specialist. Set exactly Yes or No.
        collect: slot_speak_to_human
        utter: utter_ask_slot_speak_to_human
        ask_before_filling: true
        reset_after_flow_ends: true
        rejections: []
        force_slot_filling: false
        next:
          - if: slots.slot_speak_to_human is "Yes"
            then:
              - id: flow_check_order_status_6_link_pattern_human_handoff
                link: pattern_human_handoff

          - else: END

  flow_user_states_order_not_received:
    name: Order not received
    description: |
      This flow is triggered when a user states they have not received their order.
      It acknowledges the delay and explains that issues can occur during
      processing or delivery.
    run_pattern_completed: true

    nlu_trigger:
      - intent:
          name: user_states_order_not_received
          confidence_threshold: 0.7

    steps:
      - id: flow_user_states_order_not_received_0_utter_user_states_order_not_received
        action: utter_user_states_order_not_received
        next: flow_user_states_order_not_received_1_link_flow_check_order_status

      - id: flow_user_states_order_not_received_1_link_flow_check_order_status
        link: flow_check_order_status

  flow_list_active_orders:
    name: Active order numbers
    description: |
      Use this flow only when the user asks to list, show, view, or see all active
      orders associated with their account or phone number.

      Examples:
        - What orders do I have?
        - Show my active orders
        - List my orders
        - Do I have any open orders?

      Do not use this flow when the user wants to track a specific order.
      Do not use this flow when the user provides an order number.
      Do not use this flow when the user wants to return an order.
      Do not use this flow when the user wants to exchange an order.
      Do not use this flow when the user wants to cancel an order.
      Do not use this flow when the user says an order was not received, never
      arrived, is missing, delayed, lost, or not delivered.
    run_pattern_completed: true

    steps:
      - id: flow_list_active_orders_0_utter_list_order_numbers
        action: utter_list_order_numbers
        next: END

  flow_return_item:
    name: Return an item
    description: |
      Help the user return an item they already received.
      Use this flow only when the user explicitly says return, refund, send back,
      or wants to return a delivered item.
      Do not use this flow when the user says cancel my order, cancel an order,
      cancel ord123, or stop an order from shipping.
    persisted_slots:
      - slot_exchange_order_number
    run_pattern_completed: true

    nlu_trigger:
      - intent:
          name: return_item
          confidence_threshold: 0.7

    steps:
      - id: flow_return_item_0_collect_slot_order_number
        description: |
          The order number the user provides. Capture the user answer exactly,
          even if it looks invalid or malformed.

          Valid examples include ord123, ord456, ord555, abc909, and abc123.
          Invalid examples such as 12345, bad-order-number, or any other text
          the user claims is their order number should still be captured so the
          rejection rule can validate it.
        collect: slot_order_number
        utter: utter_ask_slot_order_number
        ask_before_filling: false
        reset_after_flow_ends: true
        rejections:
          - if: not slots.slot_order_number matches "^[a-zA-Z]{3}[0-9]{3}$"
            utter: utter_valid_order_number_syntax
        force_slot_filling: true
        next:
          - if: slots.slot_order_number is "ord123"
            then:
              - id: flow_return_item_1_utter_acknowledge_return_request
                action: utter_acknowledge_return_request
                next: flow_return_item_2_set_slots

              - id: flow_return_item_2_set_slots
                set_slots:
                  - slot_exchange_order_number: '999'
                next: flow_return_item_3_collect_slot_request_exchange_item

              - id: flow_return_item_3_collect_slot_request_exchange_item
                description: |
                  Whether the user wants to exchange the item instead of only
                  returning it. Set exactly Yes or No.
                collect: slot_request_exchange_item
                utter: utter_ask_slot_request_exchange_item
                ask_before_filling: false
                reset_after_flow_ends: true
                rejections: []
                force_slot_filling: false
                next:
                  - if: slots.slot_request_exchange_item is "Yes"
                    then: set_slots_slot_exchange_order_number

                  - else: message_utter_confirm_return_requested

              - id: set_slots_slot_exchange_order_number
                set_slots:
                  - slot_exchange_order_number: ord123
                next: flow_return_item_5_link_flow_exchange_item

              - id: flow_return_item_5_link_flow_exchange_item
                link: flow_exchange_item

              - id: message_utter_confirm_return_requested
                action: utter_confirm_return_requested
                next: flow_return_item_7_collect_slot_user_has_return_label

              - id: flow_return_item_7_collect_slot_user_has_return_label
                description: Whether the user already has the prepaid return label. Set exactly Yes or No.
                collect: slot_user_has_return_label
                utter: utter_ask_slot_user_has_return_label
                ask_before_filling: true
                reset_after_flow_ends: true
                rejections: []
                force_slot_filling: false
                next:
                  - if: slots.slot_user_has_return_label is "Yes"
                    then:
                      - id: flow_return_item_8_utter_return_item_instructions
                        action: utter_return_item_instructions
                        next: END

                  - else:
                      - id: flow_return_item_9_utter_email_label_return_instructions
                        action: utter_email_label_return_instructions
                        next: END

          - if: "{'ord456' 'ord555'} contains slots.slot_order_number"
            then: message_utter_unable_to_return_not_delivered

          - else: message_utter_order_number_not_found

      - id: message_utter_unable_to_return_not_delivered
        action: utter_unable_to_return_not_delivered
        next: flow_return_item_11_collect_slot_return_request_handled

      - id: flow_return_item_11_collect_slot_return_request_handled
        description: Whether the user says the return request has been handled. Set exactly Yes or No.
        collect: slot_return_request_handled
        utter: utter_ask_slot_return_request_handled
        ask_before_filling: true
        reset_after_flow_ends: true
        rejections: []
        force_slot_filling: false
        next:
          - if: slots.slot_return_request_handled is "Yes"
            then:
              - id: flow_return_item_12_collect_slot_speak_to_human
                description: Whether the user wants to speak to a human specialist. Set exactly Yes or No.
                collect: slot_speak_to_human
                utter: utter_ask_slot_speak_to_human
                ask_before_filling: false
                reset_after_flow_ends: true
                rejections: []
                force_slot_filling: false
                next:
                  - if: slots.slot_speak_to_human is "Yes"
                    then: connect_to_specialist

                  - else: END

          - else: END

      - id: message_utter_order_number_not_found
        action: utter_order_number_not_found
        next: flow_return_item_15_collect_slot_speak_to_human

      - id: flow_return_item_15_collect_slot_speak_to_human
        description: Whether the user wants to speak to a human specialist. Set exactly Yes or No.
        collect: slot_speak_to_human
        utter: utter_ask_slot_speak_to_human
        ask_before_filling: true
        reset_after_flow_ends: true
        rejections: []
        force_slot_filling: false
        next:
          - if: slots.slot_speak_to_human is "Yes"
            then: connect_to_specialist

          - else: END

      - id: connect_to_specialist
        action: utter_connect_to_specialist
        next: hangup_call

      - id: hangup_call
        link: hangup_call

  flow_exchange_item:
    name: Exchange an item
    description: |
      Use this flow when the user wants to exchange an item or exchange an order
      for a different size, color, variant, or replacement item.

      Examples:
        - exchange order ord123
        - I want to exchange order ord123
        - I need to exchange an item
        - I ordered the wrong size and need an exchange
        - can I exchange this item?

      Do not use the check order status flow when the user says exchange.
      Do not use the return item flow when the user explicitly says exchange.
    if: slots.slot_exchange_order_number is not "999"
    run_pattern_completed: true

    nlu_trigger:
      - intent:
          name: exchange_item
          confidence_threshold: 0.7

    steps:
      - id: flow_exchange_item_0_collect_slot_exchange_order_number
        description: |
          The exchange order number the user provides. Capture the user answer
          exactly, even if it looks invalid or malformed.

          Valid examples include ord123, ord456, ord555, abc909, and abc123.
          Invalid examples such as 12345, bad-order-number, or any other text
          the user claims is their order number should still be captured so the
          rejection rule can validate it.
        collect: slot_exchange_order_number
        utter: utter_ask_slot_exchange_order_number
        ask_before_filling: false
        reset_after_flow_ends: true
        rejections:
          - if: not slots.slot_exchange_order_number matches "^[a-zA-Z]{3}[0-9]{3}$"
            utter: utter_valid_order_number_syntax
        force_slot_filling: false
        next:
          - if: slots.slot_exchange_order_number is "ord123"
            then: message_utter_confirm_exchange_item

          - else: message_utter_order_number_not_found

      - id: message_utter_confirm_exchange_item
        action: utter_confirm_exchange_item
        next: flow_exchange_item_2_collect_slot_reason_for_item_exchange

      - id: flow_exchange_item_2_collect_slot_reason_for_item_exchange
        description: |
          The reason for requesting an exchange. For example: size issue, wrong
          item ordered, did not fit right, or not what I expected.
        collect: slot_reason_for_item_exchange
        utter: utter_ask_slot_reason_for_item_exchange
        ask_before_filling: false
        reset_after_flow_ends: true
        rejections: []
        force_slot_filling: false
        next: flow_exchange_item_3_utter_exchange_reason_thank_you

      - id: flow_exchange_item_3_utter_exchange_reason_thank_you
        action: utter_exchange_reason_thank_you
        next: flow_exchange_item_4_collect_slot_user_has_return_label

      - id: flow_exchange_item_4_collect_slot_user_has_return_label
        description: Whether the user already has the prepaid return label. Set exactly Yes or No.
        collect: slot_user_has_return_label
        utter: utter_ask_slot_user_has_return_label
        ask_before_filling: true
        reset_after_flow_ends: true
        rejections: []
        force_slot_filling: false
        next:
          - if: slots.slot_user_has_return_label is "Yes"
            then:
              - id: flow_exchange_item_5_utter_return_item_instructions
                action: utter_return_item_instructions
                next: END

          - else:
              - id: flow_exchange_item_6_utter_email_label_return_instructions
                action: utter_email_label_return_instructions
                next: END

      - id: message_utter_order_number_not_found
        action: utter_order_number_not_found
        next: flow_exchange_item_8_collect_slot_speak_to_human

      - id: flow_exchange_item_8_collect_slot_speak_to_human
        description: Whether the user wants to speak to a human specialist. Set exactly Yes or No.
        collect: slot_speak_to_human
        utter: utter_ask_slot_speak_to_human
        ask_before_filling: false
        reset_after_flow_ends: true
        rejections: []
        force_slot_filling: false
        next:
          - if: slots.slot_speak_to_human is "Yes"
            then:
              - id: connect_to_specialist
                action: utter_connect_to_specialist
                next: hangup_call

          - else: END

      - id: hangup_call
        link: hangup_call

  flow_pause_subscription:
    name: Pause subscription
    description: |
      This flow allows users to temporarily pause or place a hold on an active
      subscription or membership, such as a gym plan or recurring service. It
      confirms the account, gathers the preferred pause duration or reason, and
      informs the user of any policy details or reactivation steps.
    persisted_slots:
      - slot_pause_subscription
    run_pattern_completed: true

    nlu_trigger:
      - intent:
          name: pause_subscription
          confidence_threshold: 0.7

    steps:
      - id: flow_pause_subscription_0_collect_slot_subscription_type
        description: |
          A type of subscription or membership. For instance: Gym membership,
          Meal Kit service, Internet service, or Subscription Boxes.
        collect: slot_subscription_type
        utter: utter_ask_slot_subscription_type
        ask_before_filling: false
        reset_after_flow_ends: true
        rejections: []
        force_slot_filling: false
        next: flow_pause_subscription_1_collect_slot_pause_subscription

      - id: flow_pause_subscription_1_collect_slot_pause_subscription
        description: Whether the user wants to pause the subscription. Set exactly Yes or No.
        collect: slot_pause_subscription
        utter: utter_ask_slot_pause_subscription
        ask_before_filling: false
        reset_after_flow_ends: true
        rejections: []
        force_slot_filling: false
        next:
          - if: slots.slot_pause_subscription is "Yes"
            then:
              - id: flow_pause_subscription_2_utter_subscription_paused
                action: utter_subscription_paused
                next: END

          - else: END

  flow_cancel_subscription:
    name: Cancel subscription
    description: |
      Help the user cancel a recurring subscription, plan, membership, or service.
      Use this flow for subscriptions such as gym membership, internet service,
      meal kit service, subscription box, monthly plan, or premium membership.
      Do not use this flow for product orders, order numbers, cancel my order,
      cancel order 12345, or cancel ord123.

    nlu_trigger:
      - intent:
          name: cancel_subscription
          confidence_threshold: 0.7

    steps:
      - id: flow_cancel_subscription_0_collect_slot_subscription_type
        description: |
          A type of subscription or membership. For instance: Gym membership,
          Meal Kit service, Internet service, or Subscription Boxes.
        collect: slot_subscription_type
        utter: utter_ask_slot_subscription_type
        ask_before_filling: false
        reset_after_flow_ends: true
        rejections: []
        force_slot_filling: false
        next: message_utter_check_for_promotions

      - id: message_utter_check_for_promotions
        action: utter_check_for_promotions
        next: flow_cancel_subscription_4_action_artificial_delay

      - id: flow_cancel_subscription_4_action_artificial_delay
        action: action_artificial_delay
        next: flow_cancel_subscription_5_collect_slot_accepted_retention_offer

      - id: flow_cancel_subscription_5_collect_slot_accepted_retention_offer
        description: Whether the user accepts the retention promotion offer. Set exactly Yes or No.
        collect: slot_accepted_retention_offer
        utter: utter_ask_slot_accepted_retention_offer
        ask_before_filling: true
        reset_after_flow_ends: true
        rejections: []
        force_slot_filling: false
        next:
          - if: slots.slot_accepted_retention_offer is "Yes"
            then: message_utter_send_sms_promo_text

          - else:
              - id: flow_cancel_subscription_6_utter_cancelled_subscription
                action: utter_cancelled_subscription
                next: END

      - id: message_utter_send_sms_promo_text
        action: utter_send_sms_promo_text
        next: flow_cancel_subscription_8_action_send_sms_promo_text

      - id: flow_cancel_subscription_8_action_send_sms_promo_text
        action: action_send_sms_promo_text
        next: flow_cancel_subscription_9_collect_slot_promo_text_received

      - id: flow_cancel_subscription_9_collect_slot_promo_text_received
        description: Whether the user received the promo text and completed the required action. Set exactly Yes or No.
        collect: slot_promo_text_received
        utter: utter_ask_slot_promo_text_received
        ask_before_filling: true
        reset_after_flow_ends: true
        rejections: []
        force_slot_filling: false
        next:
          - if: slots.slot_promo_text_received is "Yes"
            then:
              - id: flow_cancel_subscription_10_utter_sms_promo_text_received
                action: utter_sms_promo_text_received
                next: END

          - else: message_utter_sms_promo_text_not_received

      - id: message_utter_sms_promo_text_not_received
        action: utter_sms_promo_text_not_received
        next: flow_cancel_subscription_12_link_pattern_human_handoff

      - id: flow_cancel_subscription_12_link_pattern_human_handoff
        link: pattern_human_handoff

  flow_cancel_item:
    name: Cancel item
    description: |
      Help the user cancel a specific item, product, purchase, or order before it
      is completed or delivered.
      Use this flow when the user says they want to cancel an order, cancel my
      order, cancel order 12345, cancel ord123, cancel an item, or stop an order
      from shipping.
      Do not use the return item, exchange item, check order status, or cancel
      subscription flows for order cancellation requests.

    nlu_trigger:
      - intent:
          name: cancel_item
          confidence_threshold: 0.7

    steps:
      - id: flow_cancel_item_0_get_cancellable_items
        action: action_get_cancellable_items
        next: flow_cancel_item_1_collect_cancellation_target

      - id: flow_cancel_item_1_collect_cancellation_target
        description: |
          The actual product, service, subscription, membership, order,
          appointment, reservation, or delivery the user wants to cancel. The user
          should describe the thing to cancel, such as internet service, gym
          membership, meal kit service, order, appointment, reservation, or
          delivery. Do not ask whether they mean a specific item or an entire
          subscription.
        collect: slot_cancellation_target
        utter: utter_ask_slot_cancellation_target
        ask_before_filling: false
        reset_after_flow_ends: true
        force_slot_filling: false
        next: flow_cancel_item_2_resolve_cancellation_target

      - id: flow_cancel_item_2_resolve_cancellation_target
        action: action_resolve_cancellation_target
        next:
          - if: slots.slot_cancellation_type is "subscription"
            then: flow_cancel_item_3_call_cancel_subscription

          - if: slots.slot_cancellation_type is "appointment"
            then: flow_cancel_item_4_cancel_appointment

          - if: slots.slot_cancellation_type is "order"
            then: flow_cancel_item_5_cancel_order

          - else: flow_cancel_item_6_target_not_found

      - id: flow_cancel_item_3_call_cancel_subscription
        link: flow_cancel_subscription

      - id: flow_cancel_item_4_cancel_appointment
        action: utter_cancelled_appointment
        next: END

      - id: flow_cancel_item_5_cancel_order
        action: utter_cancelled_order
        next: END

      - id: flow_cancel_item_6_target_not_found
        action: utter_cancellation_target_not_found
        next: flow_cancel_item_7_reset_unmatched_cancellation_target

      - id: flow_cancel_item_7_reset_unmatched_cancellation_target
        set_slots:
          - slot_cancellation_target: null
          - slot_cancellation_type: null
          - selected_cancellable_item_id: null
          - slot_subscription_type: null
        next: flow_cancel_item_1_collect_cancellation_target

  pattern_human_handoff:
    name: pattern_human_handoff
    description: Conversation repair flow for switching users to a human agent if their request cannot be handled
    run_pattern_completed: true

    steps:
      - id: pattern_human_handoff_0_utter_human_handoff_override
        action: utter_human_handoff_override
        next: hangup_call

      - id: hangup_call
        link: hangup_call
